<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}EduPulse{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --navy: #0a1628; --navy-mid: #112240; --blue: #1e3a8a;
  --accent: #f59e0b; --accent-light: #fcd34d; --teal: #0ea5e9;
  --green: #10b981; --red: #ef4444; --cream: #fafaf8;
  --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-500: #6b7280;
  --gray-700: #374151; --text: #111827;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(10,22,40,0.10);
  --shadow-lg: 0 12px 48px rgba(10,22,40,0.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 70% 50% at 5% 0%,rgba(30,58,138,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 70% at 95% 100%,rgba(245,158,11,0.06) 0%,transparent 60%),
    var(--cream);
}
nav{
  background:var(--navy);color:white;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5vw;height:66px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(10,22,40,0.3);
}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;}
.nav-logo-icon{
  width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--teal));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif;
}
.nav-logo-text{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;}
.nav-logo-sub{font-size:0.65rem;color:var(--accent-light);letter-spacing:0.15em;text-transform:uppercase;}
.nav-links{display:flex;gap:4px;}
.nav-link{
  color:rgba(255,255,255,0.65);text-decoration:none;
  font-size:0.875rem;font-weight:500;padding:8px 16px;border-radius:8px;transition:all 0.2s;
}
.nav-link:hover{color:white;background:rgba(255,255,255,0.1);}
.nav-link.active{color:var(--accent-light);background:rgba(245,158,11,0.12);}
.nav-cta{
  background:var(--accent);color:var(--navy);font-weight:600;font-size:0.875rem;
  padding:9px 20px;border-radius:8px;text-decoration:none;transition:all 0.2s;
}
.nav-cta:hover{background:var(--accent-light);transform:translateY(-1px);}
main{max-width:1100px;margin:0 auto;padding:40px 5vw 80px;}
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--gray-200);padding:28px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:12px 24px;
  border-radius:10px;border:none;font-family:'DM Sans',sans-serif;
  font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.btn-primary{background:var(--navy);color:white;}
.btn-primary:hover{background:var(--blue);transform:translateY(-2px);box-shadow:0 8px 24px rgba(10,22,40,0.2);}
.btn-accent{background:var(--accent);color:var(--navy);}
.btn-accent:hover{background:var(--accent-light);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--navy);border:2px solid var(--navy);}
.btn-outline:hover{background:var(--navy);color:white;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:0.78rem;font-weight:600;}
.badge-gold{background:#fef3c7;color:#92400e;}
.badge-silver{background:#f1f5f9;color:#334155;}
.badge-bronze{background:#fef2f2;color:#991b1b;}
.badge-teal{background:#e0f2fe;color:#075985;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.6s ease both;}
.fade-up-2{animation:fadeUp 0.6s 0.15s ease both;}
.fade-up-3{animation:fadeUp 0.6s 0.3s ease both;}
.fade-up-4{animation:fadeUp 0.6s 0.45s ease both;}
.section-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;color:var(--navy);margin-bottom:6px;}
.section-sub{color:var(--gray-500);font-size:0.9rem;margin-bottom:28px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px;}
.stat-card{
  background:white;border-radius:var(--radius);padding:22px 24px;
  border:1px solid var(--gray-200);box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--teal));}
.stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--navy);}
.stat-label{font-size:0.82rem;color:var(--gray-500);margin-top:4px;}
.stat-icon{font-size:1.5rem;margin-bottom:8px;}
table{width:100%;border-collapse:collapse;font-size:0.875rem;}
th{text-align:left;padding:12px 16px;background:var(--navy);color:white;font-weight:500;font-size:0.8rem;letter-spacing:0.05em;}
th:first-child{border-radius:8px 0 0 0;}th:last-child{border-radius:0 8px 0 0;}
td{padding:12px 16px;border-bottom:1px solid var(--gray-100);}
tr:hover td{background:var(--gray-100);}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:0.85rem;font-weight:600;color:var(--gray-700);margin-bottom:6px;}
.form-control{
  width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);
  border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;
  background:white;color:var(--text);transition:border-color 0.2s,box-shadow 0.2s;appearance:none;
}
.form-control:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,22,40,0.08);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.progress-bar{height:8px;background:var(--gray-200);border-radius:99px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),var(--navy));transition:width 1s ease;}
footer{background:var(--navy);color:rgba(255,255,255,0.5);text-align:center;padding:24px;font-size:0.8rem;}
footer span{color:var(--accent);}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}.nav-links{display:none;}}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">E</div>
    <div>
      <div class="nav-logo-text">EduPulse</div>
      <div class="nav-logo-sub">La voix des étudiants</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link {% if request.endpoint=='index' %}active{% endif %}">🏠 Accueil</a>
    <a href="/dashboard" class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}">📊 Dashboard</a>
  </div>
  <a href="/formulaire" class="nav-cta">✏️ Participer</a>
</nav>
{% block content %}{% endblock %}
<footer>
  <p>© 2024 <span>EduPulse</span> — Collecte & Analyse Académique · INF232 EC2</p>
</footer>
{% block extra_js %}{% endblock %}
</body>
</html>
